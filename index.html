<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres ser mi novia? 💖</title>
    <style>
        :root {
            --rosa-intenso: #d81b60;
            --rosa-claro: #ff6090;
            --blanco: #ffffff;
            --negro: #000000;
            --sombra-texto: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: var(--negro);
            margin: 0;
            padding: 0;
        }

        /* Pantalla de Desbloqueo */
        #pantalla-desbloqueo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--negro);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        #pantalla-desbloqueo h2 {
            color: var(--blanco);
            font-size: 2.5rem;
            text-align: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1); 
                opacity: 0.8;
            }
            50% { 
                transform: scale(1.1); 
                opacity: 1;
            }
        }

        /* Pantalla Inicial */
        .pantalla-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
            z-index: 10;
        }

        #canvas-corazon {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .pantalla-inicial::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .contenedor-central {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
        }

        .titulo-principal {
            color: var(--blanco);
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 2rem;
            text-shadow: var(--sombra-texto);
            animation: heartbeat 2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .contenedor-botones {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            min-height: 60px;
        }

        .boton {
            background: var(--rosa-intenso);
            color: var(--blanco);
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
            position: relative;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            outline: none;
        }

        .boton:hover {
            background: var(--rosa-claro);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(216, 27, 96, 0.4);
        }

        .boton:active {
            background: var(--rosa-intenso);
            box-shadow: 0 2px 10px rgba(216, 27, 96, 0.5);
            transform: translateY(0);
        }

        #btn-no {
            position: absolute;
            transition: all 0.2s ease;
        }

        /* Pantalla Final */
        .pantalla-final {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            overflow: hidden;
            background-color: var(--negro);
            z-index: 5;
        }

        canvas {
            display: block;
            background-color: var(--negro);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .titulo-principal {
                font-size: 1.8rem;
                margin-bottom: 1.5rem;
            }
            
            .boton {
                padding: 0.8rem 1.5rem;
                font-size: 1rem;
            }
            
            .contenedor-botones {
                gap: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .titulo-principal {
                font-size: 1.5rem;
            }
            
            .boton {
                padding: 0.7rem 1.2rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Pantalla de Desbloqueo -->
    <div id="pantalla-desbloqueo">
        <h2>Toca para empezar ✨</h2>
    </div>

    <!-- Pantalla Inicial -->
    <div class="pantalla-inicial" id="pantalla-inicial">
        <canvas id="canvas-corazon"></canvas>
        <div class="contenedor-central">
            <h1 class="titulo-principal" id="titulo-principal">¿Quieres ser mi novia? 💖✨</h1>
            <div class="contenedor-botones">
                <button class="boton" id="btn-si">Sí 😘</button>
                <button class="boton" id="btn-no">No 💔</button>
            </div>
        </div>
    </div>

    <!-- Pantalla Final -->
    <div class="pantalla-final" id="pantalla-final">
        <canvas id="canvas-galaxia"></canvas>
    </div>

    <!-- Audio Elements -->
    <audio id="audio-chill" loop>
        <source src="chill.mp3" type="audio/mpeg">
    </audio>
    <audio id="audio-romance" loop>
        <source src="romance.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>
    <script>
        // Variables globales
        const btnSi = document.getElementById('btn-si');
        const btnNo = document.getElementById('btn-no');
        const tituloPrincipal = document.getElementById('titulo-principal');
        const pantallaInicial = document.getElementById('pantalla-inicial');
        const pantallaFinal = document.getElementById('pantalla-final');
        const pantallaDesbloqueo = document.getElementById('pantalla-desbloqueo');
        const canvasCorazon = document.getElementById('canvas-corazon');
        const ctxCorazon = canvasCorazon.getContext('2d');
        const audioChill = document.getElementById('audio-chill');
        const audioRomance = document.getElementById('audio-romance');
        
        let aceptado = false;
        let scene, camera, renderer, textGroup;
        let targetDist = 300, currentDist = 300, rotX = 0.2, rotY = 0;
        let movimientoNoInterval;
        let particles = [];
        let animationId;

        // Frases románticas
        const frasesRomanticas = [
            "Mi mundo 🌎", "Amor eterno ❤️", "Mi todo 🪐", "Siempre tú 🫂", "Mi luz ✨",
            "Contigo 🥰", "Mi sol ☀️", "Mi universo 🌌", "Mi razón 💝", "Mi amor 💖",
            "Mi vida 🎁", "Mi esperanza 💘", "Mi felicidad 😍", "Mi destino 🫣", "Mi pasión 🕯️",
            "Mi sueño 😜", "Mi anhelo 😽", "Mi tesoro 🌟", "Mi alegría 💐", "Mi paz 🍵",
            "Mi fuerza 🤩", "Mi inspiración 💌", "Mi refugio 💓", "Mi hogar 🏡", "Mi camino 😁",
            "Mi estrella 🌠", "Mi guía 🌹", "Mi paraíso 🌈", "Mi bendición", "Mi presente ❤️‍🔥",
            "Mi futuro 💍", "Eres todo 😘", "Amor mío 💞", "Mi corazón 💗", "Alma gemela 💕",
            "Mi razón de ser 🥰", "💖 Mi amor", "🌞 Mi sol", "🌎 Mi mundo", "✨ Brillas",
            "❤️ Te amo", "🌌 Universo", "👑 Reina", "🌠 Estrella", "💫 Mi cielo",
            "🔥 Siempre tú", "🎶 Tu risa", "🦋 Libertad", "💎 Eres todo", "🙏 Gracias",
            "💕 Cariño", "🌹 Amor eterno", "🤗 Abrazos", "🌸 Esperanza", "🌈 Alegría",
            "🌟 Contigo", "🧸 Ternura", "🎁 Mi razón", "🌙 Mi destino", "💌 Recuerdos",
            "🕊️ Mi paz", "🪐 Mi universo", "🌊 Mi calma", "💡 Mi luz", "🍒 Dulzura",
            "🥰 Mi vida", "🎇 Felicidad", "🌻 Alegría", "🌺 Mi flor", "💜 Eternidad"
        ];

        // Clase Partícula para el corazón
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 1;
                this.life = 1;
            }

            update() {
                // Movimiento suave alrededor de la posición base
                this.x += this.vx;
                this.y += this.vy;
                
                // Fuerza de retorno a la posición base (corazón)
                const dx = this.baseX - this.x;
                const dy = this.baseY - this.y;
                this.x += dx * 0.02;
                this.y += dy * 0.02;
                
                // Movimiento aleatorio sutil
                this.vx += (Math.random() - 0.5) * 0.01;
                this.vy += (Math.random() - 0.5) * 0.01;
                
                // Limitar velocidad
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                ctxCorazon.beginPath();
                ctxCorazon.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctxCorazon.fillStyle = `rgba(216, 27, 96, ${this.life})`;
                ctxCorazon.fill();
            }
        }

        // Ecuación paramétrica del corazón
        function getHeartPosition(t, scale = 10) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return {
                x: x * scale + canvasCorazon.width / 2,
                y: y * scale + canvasCorazon.height / 2 - 50
            };
        }

        // Inicializar canvas del corazón
        function initCorazonCanvas() {
            canvasCorazon.width = window.innerWidth;
            canvasCorazon.height = window.innerHeight;
            
            // Crear partículas en forma de corazón
            particles = [];
            for (let i = 0; i < 120; i++) {
                const t = (i / 120) * Math.PI * 2;
                const heartPos = getHeartPosition(t, 12);
                const offsetX = (Math.random() - 0.5) * 30;
                const offsetY = (Math.random() - 0.5) * 30;
                particles.push(new Particle(
                    heartPos.x + offsetX,
                    heartPos.y + offsetY
                ));
            }
        }

        // Animar canvas del corazón
        function animarCorazon() {
            ctxCorazon.clearRect(0, 0, canvasCorazon.width, canvasCorazon.height);
            
            // Actualizar y dibujar partículas
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // Dibujar líneas entre partículas cercanas
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 80) {
                        ctxCorazon.beginPath();
                        ctxCorazon.moveTo(particles[i].x, particles[i].y);
                        ctxCorazon.lineTo(particles[j].x, particles[j].y);
                        ctxCorazon.strokeStyle = `rgba(216, 27, 96, ${0.3 * (1 - distance / 80)})`;
                        ctxCorazon.lineWidth = 0.5;
                        ctxCorazon.stroke();
                    }
                }
            }
            
            animationId = requestAnimationFrame(animarCorazon);
        }

        // Pantalla de desbloqueo
        pantallaDesbloqueo.addEventListener('click', function() {
            pantallaDesbloqueo.style.opacity = '0';
            setTimeout(() => {
                pantallaDesbloqueo.style.display = 'none';
                // Reproducir audio chill
                audioChill.play().catch(e => console.log('Autoplay bloqueado:', e));
            }, 1000);
        });

        // Función para obtener coordenadas aleatorias cerca del botón "Sí"
        function obtenerCoordenadasAleatorias(elemento) {
            const siRect = btnSi.getBoundingClientRect();
            const contenedorRect = btnSi.parentElement.getBoundingClientRect();
            
            // Área alrededor del botón Sí (aproximadamente 200px a cada lado)
            const areaSize = 200;
            const minX = Math.max(10, siRect.left - contenedorRect.left - areaSize);
            const maxX = Math.min(window.innerWidth - elemento.offsetWidth - 20, siRect.right - contenedorRect.left + areaSize);
            const minY = Math.max(10, siRect.top - contenedorRect.top - areaSize);
            const maxY = Math.min(window.innerHeight - elemento.offsetHeight - 20, siRect.bottom - contenedorRect.top + areaSize);
            
            const randomX = Math.random() * (maxX - minX) + minX;
            const randomY = Math.random() * (maxY - minY) + minY;
            
            return { x: randomX, y: randomY };
        }

        // Event listener para el botón "No" (el que escapa)
        function moverBotonNo() {
            if (aceptado) return;
            
            const coords = obtenerCoordenadasAleatorias(btnNo);
            btnNo.style.left = coords.x + 'px';
            btnNo.style.top = coords.y + 'px';
        }

        function iniciarMovimientoNo() {
            if (aceptado) return;
            
            // Cambiar a posición absoluta y empezar movimiento constante
            btnNo.style.position = 'absolute';
            moverBotonNo();
            
            // Mover el botón cada 500ms
            movimientoNoInterval = setInterval(() => {
                if (!aceptado) {
                    moverBotonNo();
                }
            }, 500);
        }

        function detenerMovimientoNo() {
            if (movimientoNoInterval) {
                clearInterval(movimientoNoInterval);
                movimientoNoInterval = null;
            }
        }

        btnNo.addEventListener('mouseover', iniciarMovimientoNo);
        btnNo.addEventListener('touchstart', function(e) {
            e.preventDefault();
            iniciarMovimientoNo();
        });
        btnNo.addEventListener('click', function(e) {
            e.preventDefault();
            iniciarMovimientoNo();
        });

        // Event listener para el botón "Sí"
        btnSi.addEventListener('click', function() {
            aceptado = true;
            
            // Detener movimiento del botón No
            detenerMovimientoNo();
            
            // Transición de audio: detener chill y empezar romance
            audioChill.pause();
            audioChill.currentTime = 0;
            audioRomance.play().catch(e => console.log('Error reproduciendo romance:', e));
            
            // Cambiar texto
            tituloPrincipal.textContent = "¡Sabía que dirías que sí! 💞";
            
            // Ocultar botón "No"
            btnNo.style.display = 'none';
            
            // Cambiar botón "Sí"
            btnSi.textContent = "🎁 Para ti 🎁";
            btnSi.id = 'btn-regalo';
            
            // Añadir nuevo event listener
            btnSi.onclick = mostrarSorpresa;
        });

        // Función para mostrar la pantalla final
        function mostrarSorpresa() {
            // Detener animación del corazón
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            // Transición instantánea sin espera
            pantallaInicial.style.display = 'none';
            pantallaFinal.style.display = 'block';
            iniciarGalaxia();
        }

        // Función para iniciar la galaxia 3D
        function iniciarGalaxia() {
            const canvas = document.getElementById('canvas-galaxia');
            
            // Configurar renderer
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true,
                alpha: false,
                preserveDrawingBuffer: false
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 1);
            
            // Crear escena y cámara
            scene = new THREE.Scene();
            scene.background = null;
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            // Cargar textura de fondo
            const loader = new THREE.TextureLoader();
            const nebulaTex = loader.load("https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/cube/space/px.jpg");
            scene.background = nebulaTex;
            
            // Crear estrellas de fondo
            crearEstrellasFondo();
            
            // Crear agujero negro central
            crearAgujeroNegro();
            
            // Crear texto central
            crearTextoCentral();
            
            // Crear anillos
            crearAnillos();
            
            // Crear partículas de texto
            crearParticulasTexto();
            
            // Configurar controles
            configurarControles();
            
            // Iniciar animación
            animar();
        }

        function crearEstrellasFondo() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2000;
            const positions = new Float32Array(3 * starsCount);
            
            for (let i = 0; i < starsCount; i++) {
                const radius = 2000 * (0.3 + 0.7 * Math.random());
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[3 * i + 0] = radius * Math.sin(phi) * Math.cos(theta);
                positions[3 * i + 1] = radius * Math.cos(phi);
                positions[3 * i + 2] = radius * Math.sin(phi) * Math.sin(theta);
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            scene.add(new THREE.Points(starsGeometry, new THREE.PointsMaterial({
                size: 1.5,
                color: 0xffffff,
                depthWrite: false
            })));
        }

        function crearAgujeroNegro() {
            const coreMat = new THREE.MeshPhongMaterial({
                color: 0x111144,
                transparent: true,
                opacity: 0.6,
                shininess: 200
            });
            const core = new THREE.Mesh(new THREE.SphereGeometry(40, 64, 64), coreMat);
            scene.add(core);
            
            // Crear brillo
            const glow = new THREE.Sprite(new THREE.SpriteMaterial({
                map: crearTexturaBrillo(),
                transparent: true,
                depthWrite: false
            }));
            glow.scale.set(500, 500, 1);
            scene.add(glow);
        }

        function crearTextoCentral() {
            const centerTex = crearTexturaCanvas("TE AMO ❤️");
            const centerMat = new THREE.SpriteMaterial({ map: centerTex, transparent: true });
            const centerSprite = new THREE.Sprite(centerMat);
            centerSprite.scale.set(60, 60, 1);
            centerSprite.position.set(0, 0, 0);
            centerSprite.renderOrder = 999;
            scene.add(centerSprite);
        }

        function crearAnillos() {
            const ring1 = new THREE.Mesh(
                new THREE.RingGeometry(60, 80, 128),
                new THREE.MeshBasicMaterial({
                    map: crearTexturaAnillo(),
                    transparent: true,
                    side: THREE.DoubleSide
                })
            );
            const ring2 = new THREE.Mesh(
                new THREE.RingGeometry(85, 100, 128),
                new THREE.MeshBasicMaterial({
                    map: crearTexturaAnillo(),
                    transparent: true,
                    side: THREE.DoubleSide,
                    opacity: 0.6
                })
            );
            
            ring1.rotation.x = ring2.rotation.x = Math.PI / 2;
            scene.add(ring1);
            scene.add(ring2);
        }

        function crearParticulasTexto() {
            const colors = ["#ff66ff", "#66ccff", "#ffd36b", "#ff9966", "#8df59a", "#ffa0f8", "#c6a7ff", "#ff4444", "#44ff99", "#99ccff"];
            textGroup = new THREE.Group();
            scene.add(textGroup);
            
            for (let i = 0; i < frasesRomanticas.length; i++) {
                const textTex = crearTexturaCanvas(frasesRomanticas[i], colors[i % colors.length]);
                const textMat = new THREE.SpriteMaterial({ map: textTex, transparent: true });
                const textSprite = new THREE.Sprite(textMat);
                
                textSprite.scale.set(50, 16, 1);
                
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = Math.random() * Math.PI * 2;
                const radius = 150 + 120 * Math.random();
                
                textSprite.position.set(
                    radius * Math.sin(phi) * Math.cos(theta),
                    radius * Math.cos(phi),
                    radius * Math.sin(phi) * Math.sin(theta)
                );
                
                textSprite.userData = {
                    phi: phi,
                    theta: theta,
                    radius: radius,
                    speed: 0.001 + 0.001 * Math.random()
                };
                
                textGroup.add(textSprite);
            }
        }

        function crearTexturaCanvas(texto, color = "#ff0033") {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            ctx.shadowColor = color;
            ctx.shadowBlur = 30;
            ctx.fillText(texto, canvas.width / 2, canvas.height / 2);
            
            return new THREE.CanvasTexture(canvas);
        }

        function crearTexturaBrillo(size = 768, color1 = "255,160,0", color2 = "255,60,0") {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(size/2, size/2, 0.05*size, size/2, size/2, 0.5*size);
            gradient.addColorStop(0, `rgba(${color1},0.9)`);
            gradient.addColorStop(0.5, `rgba(${color2},0.5)`);
            gradient.addColorStop(1, "rgba(0,0,0,0)");
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            return new THREE.CanvasTexture(canvas);
        }

        function crearTexturaAnillo(size = 768) {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            ctx.translate(size/2, size/2);
            const innerRadius = 0.34 * size;
            const outerRadius = 0.49 * size;
            
            const gradient = ctx.createRadialGradient(0, 0, 0.3*innerRadius, 0, 0, outerRadius);
            gradient.addColorStop(0, "rgba(255,255,200,1)");
            gradient.addColorStop(0.3, "rgba(255,160,60,0.9)");
            gradient.addColorStop(0.65, "rgba(255,80,0,0.6)");
            gradient.addColorStop(1, "rgba(0,0,0,0)");
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, outerRadius, 0, 2 * Math.PI);
            ctx.arc(0, 0, innerRadius, 0, 2 * Math.PI, true);
            ctx.closePath();
            ctx.fill();
            
            return new THREE.CanvasTexture(canvas);
        }

        function configurarControles() {
            let dragging = false;
            let lastX = 0;
            let lastY = 0;
            
            function onDown(e) {
                dragging = true;
                const point = e.touches ? e.touches[0] : e;
                lastX = point.clientX;
                lastY = point.clientY;
            }
            
            function onMove(e) {
                if (!dragging) return;
                const point = e.touches ? e.touches[0] : e;
                const deltaX = (point.clientX - lastX) / window.innerWidth;
                const deltaY = (point.clientY - lastY) / window.innerHeight;
                
                rotY -= 3 * deltaX;
                rotX = Math.max(-1.2, Math.min(1.2, rotX - 2.2 * deltaY));
                
                lastX = point.clientX;
                lastY = point.clientY;
            }
            
            function onUp() {
                dragging = false;
            }
            
            // Mouse events
            addEventListener('mousedown', onDown);
            addEventListener('mousemove', onMove);
            addEventListener('mouseup', onUp);
            
            // Touch events
            addEventListener('touchstart', onDown, { passive: true });
            addEventListener('touchmove', onMove, { passive: true });
            addEventListener('touchend', onUp, { passive: true });
            
            // Zoom con rueda
            addEventListener('wheel', (e) => {
                targetDist += 0.25 * e.deltaY;
                targetDist = Math.max(160, Math.min(600, targetDist));
            }, { passive: true });
            
            // Zoom con pinch
            let pinch = 0;
            addEventListener('touchmove', (e) => {
                if (e.touches && e.touches.length === 2) {
                    e.preventDefault();
                    const distance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    if (pinch) {
                        targetDist += 0.5 * (pinch - distance);
                        targetDist = Math.max(160, Math.min(600, targetDist));
                    }
                    pinch = distance;
                }
            }, { passive: false });
            
            addEventListener('touchend', () => { pinch = 0; }, { passive: true });
        }

        function animar() {
            requestAnimationFrame(animar);
            
            const time = Date.now() * 0.001;
            
            // Animar partículas de texto
            if (textGroup) {
                textGroup.children.forEach((sprite) => {
                    sprite.material.opacity = 0.8 + 0.2 * Math.sin(2 * time);
                    sprite.userData.theta += sprite.userData.speed;
                    sprite.position.x = sprite.userData.radius * Math.sin(sprite.userData.phi) * Math.cos(sprite.userData.theta);
                    sprite.position.z = sprite.userData.radius * Math.sin(sprite.userData.phi) * Math.sin(sprite.userData.theta);
                });
            }
            
            // Suavizar zoom
            currentDist += 0.06 * (targetDist - currentDist);
            
            // Actualizar posición de cámara
            const cosX = Math.cos(rotX);
            const sinX = Math.sin(rotX);
            const cosY = Math.cos(rotY);
            const sinY = Math.sin(rotY);
            
            camera.position.set(
                currentDist * sinY * cosX,
                currentDist * sinX,
                currentDist * cosY * cosX
            );
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }

        // Inicializar posición del botón "No" al lado del botón "Sí"
        window.addEventListener('load', function() {
            setTimeout(() => {
                btnNo.style.position = 'relative';
                btnNo.style.left = 'auto';
                btnNo.style.top = 'auto';
                btnNo.style.display = 'inline-block';
            }, 100);
        });

        // Cambiar a posición absoluta solo cuando el mouse se acerca
        btnNo.addEventListener('mouseenter', function() {
            if (!aceptado) {
                btnNo.style.position = 'absolute';
                moverBotonNo();
            }
        });

        // Prevenir zoom en dispositivos móviles al tocar
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        });

        // Ajustar posición del botón "No" en cambio de orientación
        window.addEventListener('resize', function() {
            if (!aceptado && btnNo.style.position === 'absolute') {
                moverBotonNo();
            }
            
            if (renderer) {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }
            
            // Redimensionar canvas del corazón
            if (canvasCorazon.width !== window.innerWidth || canvasCorazon.height !== window.innerHeight) {
                initCorazonCanvas();
            }
        });

        // Inicializar canvas del corazón cuando se carga la página
        window.addEventListener('load', function() {
            initCorazonCanvas();
            animarCorazon();
        });
    </script>
</body>
</html>
